<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prototype: Road Horizon</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: transparent; /* Changed to transparent to show sky/land */
            perspective: 800px; /* Define perspective for 3D effect */
            perspective-origin: 50% 75%; /* Adjust perspective origin for "road" feel */
        }
        #sky, #land {
            position: absolute;
            width: 100%;
            height: 50%; /* Each takes half the viewport initially */
            left: 0;
            z-index: -1; /* Ensure they are behind the road-container and billboards */
        }
        #sky {
            top: 0;
            height: 66.66%; /* Sky takes up 2/3 of the screen */
            background: linear-gradient(to bottom, #3E9B9B, #842366); /* Aventurine to Azurite gradient */
        }
        #land {
            bottom: 0;
            height: 33.34%; /* Land takes up 1/3 of the screen */
            background: linear-gradient(to top, #15404F, #050a10); /* Bloodstone to Deep Navy gradient */
        }
        #info {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 10px;
            text-align: center;
            color: white;
            font-family: sans-serif;
            z-index: 100;
            pointer-events: none; /* Allows clicks to pass through */
            background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 100%);
        }
        #road-container {
            position: relative;
            width: 100%;
            height: 100vh;
            transform-style: preserve-3d; /* Allows child elements to be positioned in 3D space */
            overflow: hidden; /* Hide parts of road lines extending beyond container */
        }
        .road-line {
            position: absolute;
            bottom: 0; /* Anchor to the bottom of the road-container */
            width: 10px; /* Increased thickness for visibility */
            height: 33.34vh; /* Height to span from bottom to horizon */
            background-color: white; /* Made opaque for visibility */
            z-index: 0; /* Behind billboards, in front of land */
        }
        .road-line.left {
            left: 0; /* Anchor to bottom-left corner */
            transform-origin: 0% 100%; /* Pivot from bottom-left corner */
            transform: rotateZ(var(--left-road-angle)); /* Use CSS variable for dynamic angle */
        }
        .road-line.right {
            right: 0; /* Anchor to bottom-right corner */
            transform-origin: 100% 100%; /* Pivot from bottom-right corner */
            transform: rotateZ(var(--right-road-angle)); /* Use CSS variable for dynamic angle */
        }
        .billboard {
            position: absolute;
            bottom: 33.34%; /* Align bottom edge with the horizon */
            left: 50%;
            transform: translateX(-50%); /* Center the billboard horizontally */
            width: 100px; /* Base width */
            height: 80px; /* Base height */
            background-color: #D6883A; /* Agate color */
            border: 2px solid rgba(255, 255, 255, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 1.2em;
            opacity: 1; /* Start visible */
            transform-origin: bottom center; /* Scale from the bottom center */
            z-index: 1; /* Ensure billboards are in front of road lines */
        }
        .star {
            position: absolute;
            background-color: white;
            border-radius: 50%;
            opacity: 0;
            animation: star-drift linear infinite;
        }
        .lens-flare {
            position: absolute;
            top: 66.66%; /* Align with horizon */
            left: 50%;
            transform: translate(-50%, -50%); /* Center the flare */
            width: 5px; /* Initial size */
            height: 5px;
            background: radial-gradient(circle at center, rgba(255, 255, 255, 0.8) 0%, rgba(255, 255, 255, 0) 70%);
            border-radius: 50%;
            z-index: 2; /* Ensure it's above billboards */
            opacity: 0;
            pointer-events: none; /* Allows clicks to pass through */
        }
        @keyframes flare-effect {
            0% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 1;
            }
            50% {
                opacity: 0.8;
            }
            100% {
                transform: translate(-50%, -50%) scale(20);
                opacity: 0;
            }
        }
        @keyframes star-drift {
            0% {
                transform: translateX(0) translateY(0);
                opacity: 0;
            }
            10% {
                opacity: 0.8;
            }
            90% {
                opacity: 0.8;
            }
            100% {
                transform: translateX(var(--star-dx)) translateY(var(--star-dy));
                opacity: 0;
            }
        }
        @keyframes billboard-scroll {
            0% {
                transform: translateZ(-200px) translateX(0px) scale(0);
                opacity: 1; /* Billboards are visible from the start */
            }
            80% {
                opacity: 1;
            }
            100% {
                transform: translateZ(0) translateX(var(--final-x)) scale(10); /* Increased scale significantly */
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div id="info">
        <h1>Road Horizon Prototype</h1>
        <p>Content billboards scrolling from the vanishing point.</p>
    </div>
    <div id="sky"></div>
    <div id="land"></div>
    <div id="road-container">
        <div class="road-line left"></div>
        <div class="road-line right"></div>
    </div>
    <script>
        const roadContainer = document.getElementById('road-container');
        const animationDuration = 10; // seconds
        const lateralMovementMagnitude = 200; // pixels from center for left/right placement
        const creationInterval = 2000; // Milliseconds between new billboard creations (fixed interval)
        let isLeft = true; // To alternate left and right

        function createBillboard() {
            const billboard = document.createElement('div');
            billboard.classList.add('billboard');

            let initialX = 0; // Always start from the horizontal center visually
            let finalX;

            if (isLeft) {
                finalX = -lateralMovementMagnitude * 5; // Move far off to the left
            } else {
                finalX = lateralMovementMagnitude * 5; // Move far off to the right
            }

            // Alternate for the next billboard
            isLeft = !isLeft;

            billboard.style.setProperty('--initial-x', `${initialX}px`);
            billboard.style.setProperty('--final-x', `${finalX}px`);
            billboard.style.animation = `billboard-scroll ${animationDuration}s linear forwards`;

            roadContainer.appendChild(billboard);

            // Create and animate a lens flare
            const lensFlare = document.createElement('div');
            lensFlare.classList.add('lens-flare');
            roadContainer.appendChild(lensFlare);

            lensFlare.style.animation = `flare-effect 0.8s ease-out forwards`; // Short, impactful flare

            lensFlare.addEventListener('animationend', () => {
                lensFlare.remove();
            });

            // Remove billboard after animation completes to keep DOM clean
            billboard.addEventListener('animationend', () => {
                billboard.remove();
            });
        }

        // Function to calculate and update road line angles
        function updateRoadAngles() {
            const H_viewport = window.innerHeight;
            const W_viewport = window.innerWidth;
            const Y_horizon_from_bottom = 0.3334 * H_viewport; // Height from bottom to horizon

            // Left Line: from (0, H_viewport) to (W_viewport / 3, Y_horizon_from_bottom)
            const dx_left = W_viewport / 3;
            const dy_left = Y_horizon_from_bottom;
            const angle_rad_left = Math.atan(dx_left / dy_left);
            const left_angle_deg = angle_rad_left * (180 / Math.PI);

            // Right Line: from (W_viewport, H_viewport) to (2 * W_viewport / 3, Y_horizon_from_bottom)
            const dx_right = W_viewport / 3; // Same horizontal spread from center as left
            const dy_right = Y_horizon_from_bottom;
            const angle_rad_right = Math.atan(dx_right / dy_right);
            const right_angle_deg = -angle_rad_right * (180 / Math.PI); // Negative for right line

            roadContainer.style.setProperty('--left-road-angle', `${left_angle_deg}deg`);
            roadContainer.style.setProperty('--right-road-angle', `${right_angle_deg}deg`);
        }

        // Generate billboards at a fixed interval, alternating left/right
        setInterval(createBillboard, creationInterval);

        // --- Particle Effects for Sky ---
        const skyElement = document.getElementById('sky');
        const numStars = 50; // Number of stars
        const starAnimationDuration = 15; // seconds
        const starMovementRange = 100; // pixels for star drift

        function createStar() {
            const star = document.createElement('div');
            star.classList.add('star');
            skyElement.appendChild(star);

            // Random initial position within the sky container
            const startX = Math.random() * 100; // %
            const startY = Math.random() * 100; // %
            star.style.left = `${startX}%`;
            star.style.top = `${startY}%`;

            // Random size
            const size = Math.random() * 3 + 1; // 1 to 4px
            star.style.width = `${size}px`;
            star.style.height = `${size}px`;

            // Random movement vector
            const dx = (Math.random() - 0.5) * 2 * starMovementRange;
            const dy = (Math.random() - 0.5) * 2 * starMovementRange;
            star.style.setProperty('--star-dx', `${dx}px`);
            star.style.setProperty('--star-dy', `${dy}px`);

            // Random animation duration and delay
            star.style.animationDuration = `${starAnimationDuration + Math.random() * 5}s`;
            // star.style.animationDelay = `${-Math.random() * starAnimationDuration}s`; // Staggered start

            // Regenerate star after animation ends
            star.addEventListener('animationend', () => {
                star.remove();
                createStar();
            });
        }

        // Initialize stars
        for (let i = 0; i < numStars; i++) {
            createStar();
        }
    </script>
</body>
</html>
