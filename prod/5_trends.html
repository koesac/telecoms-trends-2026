        :root {

            --aventurine: #3E9B9B;

        body {

        /* Atmosphere Layers */
        #bg-container {

        }

        /* Polish: Cinematic Vignette framing the experience */

            background: radial-gradient(circle at 50% 50%, transparent 20%, rgba(5,10,16,0.85) 100%);
            pointer-events: none; z-index: 1;
        }

        .bg-layer {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;

        }

        /* UI Overlays */

        h1 {
            font-family: inherit; font-size: 1.3rem; letter-spacing: 3px; margin: 0;
            text-transform: uppercase; color: #fff; display: flex; align-items: center; gap: 15px;
            font-weight: 800;
        }

        .logo-icon {
            fill: none !important; 
            stroke: var(--agate) !important; 
            stroke-width: 2.5; /* Polish: Slightly thicker stroke for modern feel */
            width: 35px; height: 35px;
        }

        /* Polish: Frosted glass effect on navigation */
        .nav-arrow {
            position: fixed; top: 50%; transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff; width: 60px; height: 60px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; pointer-events: none; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Polish: Bouncy transition */
            font-size: 1.2rem; 
            z-index: 10; opacity: 0; 
            margin-left: env(safe-area-inset-left);
            margin-right: env(safe-area-inset-right);
        }
        
        body.active-experience .nav-arrow { opacity: 1; pointer-events: auto; }

        .nav-arrow:hover { 
            background: var(--agate); border-color: var(--agate); 
            transform: translateY(-50%) scale(1.1); /* Polish: Grow on hover */
            box-shadow: 0 10px 25px rgba(214, 136, 58, 0.4); 
        }
        .nav-left { left: 40px; }
        .nav-right { right: 40px; }

        /* Overlays */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; 
            height: 100vh; height: 100dvh;
            background: rgba(5,10,16,0.95); /* Polish: Subtle transparency */
            backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
            display: flex; justify-content: center; align-items: flex-start; 
            z-index: 5000; opacity: 0; pointer-events: none; 
            transition: opacity 0.8s ease;
            padding: calc(20px + env(safe-area-inset-top)) 20px calc(20px + env(safe-area-inset-bottom)) 20px;
            box-sizing: border-box; overflow-y: auto; 
        }
        .overlay.active { opacity: 1; pointer-events: auto; }
        
        .overlay-content { 
            max-width: 700px; text-align: center; width: 100%;
            display: flex; flex-direction: column; align-items: center;
            margin: auto; padding: 20px 0; box-sizing: border-box;
        }
        
        /* Polish: Text gradients for high-end feel */
        .overlay-content h2 { 
            font-family: inherit; letter-spacing: 4px; 
            background: linear-gradient(135deg, #fff, var(--agate));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 1rem; font-weight: 800; 
            font-size: clamp(2rem, 6vw, 3.5rem); 
        }

            font-size: clamp(1rem, 2.5vw, 1.15rem); 
            line-height: 1.6; color: #a0aab5; margin-bottom: 0.8rem; 
        }

        /* Polish: Premium buttons */
        .btn-action {
            background: rgba(214, 136, 58, 0.05); 
            border: 1px solid var(--agate); color: var(--agate);
            padding: 14px 35px; border-radius: 50px; cursor: pointer; font-family: inherit;
            font-size: 0.8rem; letter-spacing: 3px; 
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1); 
            margin-top: 1.5rem; font-weight: 700; pointer-events: auto;
            text-transform: uppercase;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-action:hover { 
            background: var(--agate); color: #fff; 
            transform: translateY(-3px); /* Polish: Hover lift */
            box-shadow: 0 10px 25px rgba(214, 136, 58, 0.3); 
        }

        /* Card Stage */
        #card-stage {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            position: relative; transform-style: preserve-3d;
            z-index: 100; pointer-events: none; 
        }

        .origami-container {
            width: 400px; height: 400px;
            position: absolute; transform-style: preserve-3d;
            cursor: pointer; transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            pointer-events: auto; background: none; border: none; padding: 0; outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        .card-inner {
            width: 100%; height: 100%;
            position: relative; transform-style: preserve-3d;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        /* Polish: Tactile hover response separated from GSAP container */
        .origami-container:not(.unfolded):hover .card-inner {
            transform: scale(1.03);
        }

        .face {
            position: absolute; top: -1px; left: 0; 
            width: 100%; height: calc(100% + 2px); 
            background-color: var(--paper); 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 35px; box-sizing: border-box; border-radius: 6px; /* Polish: Slightly softer corners */
            box-shadow: inset 0 0 50px rgba(0,0,0,0.03); color: #2a3542; z-index: 1;
            transition: transform 0.8s ease, box-shadow 0.8s ease; transform: translateZ(-1px);
            overflow: hidden;
            background-image: linear-gradient(135deg, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0) 100%);
        }

        .face::before, .face::after {
            content: ''; position: absolute; left: 0; width: 100%; height: 40px;
            pointer-events: none; opacity: 0; transition: opacity 0.8s ease; z-index: 5;
        }
        .face::before { top: 1px; background: linear-gradient(to bottom, rgba(0,0,0,0.06), transparent); }
        .face::after { bottom: 1px; background: linear-gradient(to top, rgba(0,0,0,0.06), transparent); }
        .unfolded .face::before, .unfolded .face::after { opacity: 1; }

        /* Polish: Staggered content reveal */
        .face-content {
            opacity: 0; transform: translateY(15px);
            transition: opacity 0.5s ease, transform 0.5s ease;
            transition-delay: 0s; /* Instant hide when folding */
            display: flex; flex-direction: column; align-items: center;
        }
        .unfolded .face-content {
            opacity: 1; transform: translateY(0);
            transition-delay: 0.3s; /* Wait for flap to open before revealing text */
        }

        .face p { font-size: 0.95rem; line-height: 1.6; text-align: center; margin: 0; color: #4a5568; font-weight: 500; }
        .face p strong { font-size: 0.95rem; color: #1a202c; font-weight: 800; }
        
        .face hr { width: 40px; border: none; border-top: 2px solid rgba(0,0,0,0.08); margin: 25px auto; }

        .flap {
            position: absolute; width: 100%; height: 50%;
            background-color: var(--paper); left: 0; z-index: 10;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-family: inherit; letter-spacing: 2px; font-weight: 800; color: #222;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), background 0.5s ease, border-color 0.4s ease, box-shadow 0.8s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); text-align: center; padding: 10px; box-sizing: border-box;
            background-image: linear-gradient(135deg, rgba(255,255,255,0.8), rgba(255,255,255,0));
        }

        .flap-top { 
            top: 0; transform-origin: top; border-bottom: 1px solid rgba(0,0,0,0.05); border-radius: 6px 6px 0 0; 
            font-size: 1.8rem; line-height: 1.2; 
        }

        .flap-bottom { 
            bottom: 0; transform-origin: bottom; border-top: 1px solid rgba(0,0,0,0.05); border-radius: 0 0 6px 6px; 
            font-size: 4rem;
        }

        .unfolded .flap { box-shadow: none; }
        .unfolded .flap-top { transform: rotateX(165deg); border-bottom-color: transparent; }
        .unfolded .flap-bottom { transform: rotateX(-165deg); border-top-color: transparent; }
        .unfolded .face { transform: translateZ(0px); box-shadow: 0 50px 100px rgba(0,0,0,0.5); }

        .controls {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center; gap: 15px; 
            z-index: 10; pointer-events: auto;
        }

        .dots { display: flex; gap: 15px; justify-content: center; margin-bottom: 5px; }
        
        /* Polish: Glowing dots */
        .dot { 
            width: 8px; height: 8px; border-radius: 50%; 
            background: rgba(255,255,255,0.15); cursor: pointer; 
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1); 
            border: none; padding: 0; outline: none; 
        }
        .dot.active { 
            background: var(--agate); transform: scale(1.8); 
            box-shadow: 0 0 15px rgba(214, 136, 58, 0.6); 
        }
        .dot:hover:not(.active) { background: rgba(255,255,255,0.4); transform: scale(1.2); }
        .dot:focus-visible { outline: 2px solid #fff; outline-offset: 4px; background: rgba(255,255,255,0.5); }

        .helper-text { font-size: 0.65rem; color: #fff; opacity: 0.5; letter-spacing: 3px; font-weight: 600; text-transform: uppercase; }

        @media (max-width: 768px) {
            #header-branding { top: calc(20px + env(safe-area-inset-top)) !important; left: calc(20px + env(safe-area-inset-left)) !important; }
            h1 { font-size: 1rem !important; }
            .logo-icon { width: 25px !important; height: 25px !important; }
            .origami-container { width: 340px; height: 340px; margin-top: -20px; }
            .face { padding: 25px; }
            .face p { font-size: 0.85rem; line-height: 1.5; }
            .face hr { margin: 15px auto; }
            .nav-arrow { width: 50px; height: 50px; background: rgba(0, 0, 0, 0.3); backdrop-filter: none;}
            .nav-left { left: calc(15px + env(safe-area-inset-left)); } 
            .nav-right { right: calc(15px + env(safe-area-inset-right)); }
            .flap-top { font-size: 1.5rem; } 
            .flap-bottom { font-size: 3rem; }
            .controls { bottom: calc(50px + env(safe-area-inset-bottom)); }
        }

        @media (max-width: 400px) {
            .origami-container { width: 300px; height: 300px; }
            .face p { font-size: 0.75rem; }
            .overlay-content h2 { font-size: 1.5rem; }
            .overlay-content p { font-size: 0.95rem; }
        }
    </style>
</head>

        <div class="noscript-header">
            <h1>5 THINGS SHAPING UK TELECOMS</h1>
            <p style="color: var(--agate); font-weight: 700;">And what it means for your comms</p>
            <p>UK telecoms is in the middle of something significant – a period that's reshaping competitive dynamics, investment priorities, and the fundamental question of what telecoms is. Long promised mergers are completing. AI is changing how we operate. Investments are being redistributed. And 6G needs a different story if it’s going to avoid 5G’s stumbles.</p>
        </div>

        <article class="noscript-card" style="border-top-color: var(--agate);">
            <h2>1. Market Consolidation</h2>
            <p>Vodafone and Three are finally one, consuming them in a quagmire of integration. There’s a window of opportunity to communicate with clarity while the biggest player is distracted.</p>
            <hr>
            <p><strong>Implication:</strong> With a new giant in the market, no one can compete on scale. Where you can compete is innovation, differentiation and focusing on what’s close to the hearts of your customers.</p>
        </article>

        <article class="noscript-card" style="border-top-color: var(--azurite);">
            <h2>2. AI Reality Check</h2>
            <p>AI is already in the network and the benefit is real and measurable. But the AI narrative is stuck in either being futuristic or in the technical weeds. There’s an opportunity to tell it properly.</p>
            <hr>
            <p><strong>Implication:</strong> Communicate what AI actually does in your solution, specifically for a real customer. That’s the story that cuts through. Don’t be afraid to tackle the issues and concerns around it – trust and security are paramount.</p>
        </article>

        <article class="noscript-card" style="border-top-color: var(--aventurine);">
            <h2>3. The Fibre Narrative</h2>
            <p>Fibre is winning the infrastructure race but losing the public narrative. Confusion in a crowded market and affordability anxiety is currently winning over the impressive achievement.</p>
            <hr>
            <p><strong>Implication:</strong> Battle the idea that fibre is a utility by showcasing the innovations it can enable. Shift the conversation from speed and price to impacts for remote business, rural productivity, and economic development.</p>
        </article>

        <article class="noscript-card" style="border-top-color: var(--bloodstone);">
            <h2>4. Sustainability Proof</h2>
            <p>Sustainability pledges are no longer enough, proof is needed and the industry is facing a credibility problem. Tangible trials, data and transparency around net-zero is key.</p>
            <hr>
            <p><strong>Implication:</strong> The era of sustainability-by-announcement is over. Make it tangible for increasingly savvy audiences using data, visualisation, and customer case studies to become a preferred supplier.</p>
        </article>

        <article class="noscript-card" style="border-top-color: var(--alexandrite);">
            <h2>5. The 6G Evolution</h2>
            <p>The global race to 6G is on but commercial reception is cool. 5G overpromised and while research is focused, the comms strategy framing it as 'next gen mobile' is not.</p>
            <hr>
            <p><strong>Implication:</strong> Against a backdrop of demand-led innovation, your comms needs to support a world where 6G is evolution, not revolution. Lead with business benefits and commercial outcomes.</p>
        </article>

            <h2 id="outro-title"></h2>
            <p id="outro-p1"></p>
            <p id="outro-p2"><span id="outro-p2-prefix"></span><a id="outro-email-link" href="" style="color:var(--agate); text-decoration:none; font-weight:bold; transition: opacity 0.3s; padding-bottom: 2px; border-bottom: 1px solid var(--agate);"></a></p>
            <button id="replay-btn" class="btn-action" onclick="resetExperience()">Replay Experience</button>
        </div>
    </div>

    <!-- Polish: Added .face-content wrapper for staggered reveal -->
    <template id="card-template">
        <div class="card-inner">
            <div class="flap flap-top"></div>
            <div class="face">
                <div class="face-content">
                    <p class="card-desc"></p>
                    <hr>
                    <p class="card-implication"><strong></strong></p>
                </div>
            </div>
            <div class="flap flap-bottom"><i class="fas"></i></div>
        </div>
    </template>

    <button class="nav-arrow nav-left" type="button" aria-label="Previous card" onclick="prevCard()">
        <i class="fas fa-chevron-left" aria-hidden="true"></i>
    </button>
    <button class="nav-arrow nav-right" type="button" aria-label="Next card" onclick="nextCard()">
        <i class="fas fa-chevron-right" aria-hidden="true"></i>
    </button>

    <div class="controls">
        <div class="dots" id="dots"></div>
        <div class="helper-text">Tap Card To Open</div>
    </div>

    <div id="card-stage"></div>

    <script>
        // No changes needed to the JavaScript logic!
        const TELECOMS_CONFIG = {
            branding: {
                companyName: "Innovate Comms",
                website: "https://www.innovatecomms.co.uk/",
                email: "hello@innovatecomms.co.uk"
            },
            intro: {
                title: "5 THINGS SHAPING UK TELECOMS",
                subtitle: "And what it means for your comms",
                p1: "UK telecoms is in the middle of something significant – a period that's reshaping competitive dynamics, investment priorities, and the fundamental question of what telecoms is.",
                p2: "Long promised mergers are completing. AI is changing how we operate. Investments are being redistributed. And 6G needs a different story if it’s going to avoid 5G’s stumbles. These shifts create both urgency and opportunity and how you communicate matters more now than ever."
            },
            outro: {
                title: "The Common Thread",
                p1: "The next phase of UK telecoms will hinge on smart collaborations to create advanced, sustainable networks that are genuinely useful for the UK’s digital ambitions.",
                p2: "Ready to do things differently? Say hello@innovatecomms.co.uk"
            },
            trends: [
                { id: 1, tag: "MARKET", title: "Market Consolidation", desc: "Vodafone and Three are finally one, consuming them in a quagmire of integration. There’s a window of opportunity to communicate with clarity while the biggest player is distracted.", implication: "With a new giant in the market, no one can compete on scale. Where you can compete is innovation, differentiation and focusing on what’s close to the hearts of your customers. Examine your proposition and don’t get bogged down in what worked before – this is a new playing field.", statDesc: "Competition moves from scale to innovation.", icon: "fa-handshake", color: "#D6883A" },
                { id: 2, tag: "AI", title: "AI Reality Check", desc: "AI is already in the network and the benefit is real and measurable. But the AI narrative is stuck in either being futuristic or in the technical weeds. There’s an opportunity to tell it properly.", implication: "Communicate what AI actually does in your solution, specifically for a real customer. That’s the story that cuts through. Don’t be afraid to tackle the issues and concerns around it – trust and security are paramount.", statDesc: "Trust and security are paramount for national infrastructure.", icon: "fa-brain", color: "#842366" },
                { id: 3, tag: "FIBRE", title: "The Fibre Narrative", desc: "Fibre is winning the infrastructure race but losing the public narrative. Confusion in a crowded market and affordability anxiety is currently winning over the impressive achievement.", implication: "Battle the idea that fibre is a utility by showcasing the innovations it can enable. Shift the conversation from speed and price to impacts for remote business, rural productivity, and economic development.", statDesc: "Move the conversation from price to human impact.", icon: "fa-network-wired", color: "#3E9B9B" },
                { id: 4, tag: "SUSTAINABILITY", title: "Sustainability Proof", desc: "Sustainability pledges are no longer enough, proof is needed and the industry is facing a credibility problem. Tangible trials, data and transparency around net-zero is key.", implication: "The era of sustainability-by-announcement is over. Make it tangible for increasingly savvy audiences using data, visualisation, and customer case studies to become a preferred supplier.", statDesc: "Data and transparency are the new net-zero standards.", icon: "fa-leaf", color: "#15404F" },
                { id: 5, tag: "6G", title: "The 6G Evolution", desc: "The global race to 6G is on but commercial reception is cool. 5G overpromised and while research is focused, the comms strategy framing it as 'next gen mobile' is not.", implication: "Against a backdrop of demand-led innovation, your comms needs to support a world where 6G is evolution, not revolution. Lead with business benefits and commercial outcomes.", statDesc: "Maintain UK position through commercial impact, not hype.", icon: "fa-tower-broadcast", color: "#4C194C" }
            ]
        };

        const stage = document.getElementById('card-stage');
        const dotsContainer = document.getElementById('dots');
        const bgContainer = document.getElementById('bg-container');
        const introOverlay = document.getElementById('intro-overlay');
        const conclusionOverlay = document.getElementById('conclusion-overlay');
        
        let lastFocusedElement;

        function toggleBackgroundInert(isInert) {
            const selectors = ['#header-branding', '.nav-arrow', '.controls', '#card-stage'];
            selectors.forEach(s => {
                document.querySelectorAll(s).forEach(el => {
                    if (isInert) {
                        el.setAttribute('inert', '');
                        el.setAttribute('aria-hidden', 'true');
                    } else {
                        el.removeAttribute('inert');
                        el.removeAttribute('aria-hidden');
                    }
                });
            });
        }

        function trapFocus(e, overlay) {
            const focusableElements = overlay.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
            if (focusableElements.length === 0) return;
            const firstFocusableElement = focusableElements[0];
            const lastFocusableElement = focusableElements[focusableElements.length - 1];

            if (e.key === 'Tab') {
                if (e.shiftKey) { 
                    if (document.activeElement === firstFocusableElement) {
                        lastFocusableElement.focus();
                        e.preventDefault();
                    }
                } else { 
                    if (document.activeElement === lastFocusableElement) {
                        firstFocusableElement.focus();
                        e.preventDefault();
                    }
                }
            }
        }

        introOverlay.addEventListener('keydown', (e) => trapFocus(e, introOverlay));
        conclusionOverlay.addEventListener('keydown', (e) => trapFocus(e, conclusionOverlay));
        
        const config = TELECOMS_CONFIG;
        const trends = config.trends;
        let cards = [];
        let dots = [];
        let bgLayers = [];
        let currentIndex = 0;
        let isTransitioning = false;
        let isExperienceActive = false;

        function loadMasterContent() {
            document.getElementById('intro-title').textContent = config.intro.title.toUpperCase();
            document.getElementById('intro-p1').textContent = config.intro.subtitle;
            document.getElementById('intro-p2').textContent = config.intro.p1 + " " + config.intro.p2;
            document.getElementById('outro-title').textContent = config.outro.title.toUpperCase();
            document.getElementById('outro-p1').textContent = config.outro.p1;
            
            const email = config.branding.email;
            const p2 = config.outro.p2;
            document.getElementById('outro-p2-prefix').textContent = p2.split(email)[0];
            
            const emailLink = document.getElementById('outro-email-link');
            emailLink.href = `mailto:${email}`;
            emailLink.textContent = email;
        }

        function createCard(trend, index) {
            const template = document.getElementById('card-template');
            const clone = template.content.cloneNode(true);
            
            const container = document.createElement('button');
            container.className = 'origami-container';
            container.setAttribute('aria-label', `${trend.title} card`);
            container.setAttribute('aria-expanded', 'false');
            
            const inner = clone.querySelector('.card-inner');
            container.innerElement = inner;
            
            const topFlap = clone.querySelector('.flap-top');
            topFlap.textContent = trend.title.toUpperCase();
            topFlap.style.color = trend.color;

            const bottomFlap = clone.querySelector('.flap-bottom');
            bottomFlap.style.color = trend.color;
            bottomFlap.querySelector('i').classList.add(trend.icon);

            clone.querySelector('.card-desc').textContent = trend.desc;
            clone.querySelector('.card-implication strong').textContent = trend.implication || trend.statDesc;

            container.appendChild(clone);

            container.onclick = () => { 
                if(index === currentIndex) nextCard();
            };
            stage.appendChild(container);
            
            const depth = index;
            gsap.set(container, { z: -depth * 60, y: depth * 10, rotation: (index % 2 === 0 ? 1 : -1) * (depth * 2), opacity: 1 });

            const dot = document.createElement('button');
            dot.className = 'dot';
            dot.setAttribute('aria-label', `Go to card ${index + 1}`);
            dot.onclick = () => jumpTo(index);
            dotsContainer.appendChild(dot);
            dots.push(dot);

            const bg = document.createElement('div');
            bg.className = 'bg-layer';
            bg.id = `bg-${index}`;
            bg.style.background = `radial-gradient(circle at center, ${trend.color} 0%, var(--bg-dark) 100%)`;
            bgContainer.appendChild(bg);
            bgLayers.push(bg);

            return container;
        }

        function init() {
            loadMasterContent();
            dots = [];
            bgLayers = [];
            cards = trends.map((t, i) => createCard(t, i));
            updateStack();
            toggleBackgroundInert(true);
            setTimeout(() => {
                if (introOverlay.classList.contains('active')) {
                    document.getElementById('start-btn').focus();
                }
            }, 500);
        }

        function updateStack(onComplete) {
            let animationsFinished = 0;
            const futureCardsCount = Math.max(0, cards.length - (currentIndex + 1));
            const totalExpected = cards.length + futureCardsCount;

            const checkFinished = () => {
                animationsFinished++;
                if (animationsFinished === totalExpected && typeof onComplete === 'function') {
                    onComplete();
                }
            };

            cards.forEach((card, i) => {
                const inner = card.innerElement;
                const isCurrent = i === currentIndex;
                const isPast = i < currentIndex;

                if (isPast) {
                    gsap.to(card, { 
                        x: -window.innerWidth, opacity: 1, rotation: -20, duration: 0.6, ease: "power2.inOut", 
                        overwrite: "auto",
                        onComplete: () => { 
                            card.style.visibility = 'hidden'; 
                            checkFinished();
                        }
                    });
                    card.tabIndex = -1;
                    card.setAttribute('aria-hidden', 'true');
                } else if (isCurrent) {
                    const depth = i - currentIndex;
                    card.style.visibility = 'visible';
                    card.tabIndex = 0;
                    card.setAttribute('aria-hidden', 'false');
                    gsap.to(card, { 
                        x: 0, z: -depth * 60, y: depth * 10, rotation: (i % 2 === 0 ? 1 : -1) * (depth * 2), opacity: 1, duration: 0.6, ease: "power2.out", 
                        overwrite: "auto",
                        onComplete: checkFinished 
                    });
                    if (isExperienceActive) card.focus();
                } else {
                    const depth = i - currentIndex;
                    card.style.visibility = 'visible';
                    card.tabIndex = -1;
                    card.setAttribute('aria-hidden', 'true');
                    gsap.to(card, { 
                        x: 0, z: -depth * 60, y: depth * 10, rotation: (i % 2 === 0 ? 1 : -1) * (depth * 2), opacity: 1, duration: 0.6, ease: "power2.out", 
                        overwrite: "auto",
                        onComplete: checkFinished 
                    });
                    if (depth > 0) {
                        gsap.to(inner, { 
                            rotationX: 0, rotationY: 0, duration: 0.5, 
                            overwrite: "auto",
                            onComplete: checkFinished 
                        });
                    }
                }
            });
            bgLayers.forEach((l, i) => l.classList.toggle('active', i === currentIndex));
            dots.forEach((d, i) => d.classList.toggle('active', i === currentIndex));
        }

        function startExperience() {
            isExperienceActive = true;
            cards.forEach(c => c.classList.remove('unfolded'));
            document.body.classList.add('active-experience');
            introOverlay.classList.remove('active');
            toggleBackgroundInert(false);
            currentIndex = 0;
            updateStack();
        }

        function resetExperience() {
            conclusionOverlay.classList.remove('active');
            cards.forEach(c => c.classList.remove('unfolded'));
            document.body.classList.add('active-experience');
            toggleBackgroundInert(false);
            currentIndex = 0;
            isExperienceActive = true;
            updateStack();
        }

        function showConclusion() {
            isExperienceActive = false;
            lastFocusedElement = document.activeElement;
            document.body.classList.remove('active-experience');
            conclusionOverlay.classList.add('active');
            toggleBackgroundInert(true);
            document.getElementById('replay-btn').focus();
        }

        function showIntro() {
            isExperienceActive = false;
            lastFocusedElement = document.activeElement;
            document.body.classList.remove('active-experience');
            introOverlay.classList.add('active');
            toggleBackgroundInert(true);
            document.getElementById('start-btn').focus();
            cards.forEach((card, i) => {
                card.classList.remove('unfolded');
                card.setAttribute('aria-expanded', 'false');
                const depth = i;
                gsap.set(card, { x: 0, z: -depth * 60, y: depth * 10, rotation: (i % 2 === 0 ? 1 : -1) * (depth * 2), opacity: 1, visibility: 'hidden' });
            });
        }

        function nextCard() {
            if (!isExperienceActive || isTransitioning) return;
            
            const currentCard = cards[currentIndex];
            if (!currentCard.classList.contains('unfolded')) {
                currentCard.classList.add('unfolded');
                currentCard.setAttribute('aria-expanded', 'true');
                return;
            }

            if (currentIndex === cards.length - 1) {
                currentCard.setAttribute('aria-expanded', 'false');
                showConclusion();
            } else {
                isTransitioning = true;
                currentCard.classList.remove('unfolded');
                currentCard.setAttribute('aria-expanded', 'false');
                
                gsap.delayedCall(0.3, () => {
                    currentIndex++;
                    updateStack(() => { isTransitioning = false; });
                });
            }
        }

        function prevCard() {
            if (!isExperienceActive || isTransitioning) return;
            if (currentIndex === 0) {
                showIntro();
            } else {
                isTransitioning = true;
                cards[currentIndex].classList.remove('unfolded');
                cards[currentIndex].setAttribute('aria-expanded', 'false');
                
                currentIndex--;
                updateStack(() => { isTransitioning = false; });
            }
        }

        function jumpTo(index) {
            if (!isExperienceActive || isTransitioning) return;
            
            if (index === currentIndex) {
                nextCard();
                return;
            }

            isTransitioning = true;
            cards[currentIndex].classList.remove('unfolded');
            cards[currentIndex].setAttribute('aria-expanded', 'false');
            
            currentIndex = index;
            updateStack(() => { isTransitioning = false; });
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextCard();
            if (e.key === 'ArrowLeft') prevCard();
        });

        init();
    </script>
</body>
</html>
