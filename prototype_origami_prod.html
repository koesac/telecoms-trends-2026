<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"> -->
     <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Innovate Comms</title>
    <link rel="icon" type="image/png" href="https://www.innovatecomms.co.uk/favicon-32x32.png?v=214e7223851f1968fe94184d9cbae538">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <style>
        :root {
            --agate: #D6883A;
            --aventurine: #3E9B9B;
            --azurite: #842366;
            --bloodstone: #15404F;
            --alexandrite: #4C194C;
            --bg-dark: #050a10;
            --paper: #f4f1ea;
        }

        body {
            margin: 0;
            background-color: var(--bg-dark);
            font-family: "Avenir Next LT", "Avenir Next", "Avenir", "Helvetica Neue", Helvetica, Arial, sans-serif;
            color: #fff;
            height: 100vh;
            height: 100dvh; /* Accounts for dynamic toolbars */
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            perspective: 2000px;
        }

        /* Atmosphere Layers */
        #bg-container {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 0;
        }

        .bg-layer {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            opacity: 0; transition: opacity 1s ease;
        }
        .bg-layer.active { opacity: 1; }

        /* UI Overlays */
        #header-branding {
            position: fixed; 
            top: calc(40px + env(safe-area-inset-top)); 
            left: calc(40px + env(safe-area-inset-left)); 
            pointer-events: auto;
            z-index: 10;
        }

        h1 {
            font-family: inherit; font-size: 1.5rem; letter-spacing: 2px; margin: 0;
            text-transform: uppercase; color: #fff; display: flex; align-items: center; gap: 15px;
            font-weight: 700;
        }

        .logo-icon {
            fill: none !important; 
            stroke: var(--agate) !important; 
            stroke-width: 2; 
            width: 35px; height: 35px;
        }

        .nav-arrow {
            position: fixed; top: 50%; transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff; width: 60px; height: 60px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; pointer-events: none; transition: all 0.3s ease;
            font-size: 1.2rem; backdrop-filter: blur(5px); 
            z-index: 10;
            opacity: 0; 
            margin-left: env(safe-area-inset-left);
            margin-right: env(safe-area-inset-right);
            outline: none;
            padding: 0;
            -webkit-appearance: none;
        }
        
        body.active-experience .nav-arrow {
            opacity: 1;
            pointer-events: auto;
        }

        .nav-arrow:hover { background: var(--agate); border-color: var(--agate); box-shadow: 0 0 20px rgba(214, 136, 58, 0.4); }
        .nav-arrow:focus-visible { outline: 2px solid #fff; outline-offset: 4px; background: var(--agate); }
        .nav-left { left: 40px; }
        .nav-right { right: 40px; }

        /* Overlays - FIXED TO ROOT */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; 
            height: 100vh;
            height: 100dvh;
            background: rgba(5, 10, 16, 0.95);
            display: flex; 
            justify-content: center;
            align-items: flex-start; /* Better for scrolling content */
            z-index: 5000;
            opacity: 0; pointer-events: none; transition: 1s ease;
            backdrop-filter: blur(20px);
            padding: calc(20px + env(safe-area-inset-top)) 20px calc(20px + env(safe-area-inset-bottom)) 20px;
            box-sizing: border-box;
            overflow-y: auto; /* Scroll the overlay itself */
        }
        .overlay.active { opacity: 1; pointer-events: auto; }
        .overlay-content { 
            max-width: 700px; text-align: center; width: 100%;
            display: flex; flex-direction: column; align-items: center;
            margin: auto; /* Centering trick that handles overflow correctly */
            padding: 20px 0;
            box-sizing: border-box;
        }
        .overlay-content h2 { 
            font-family: inherit; letter-spacing: 5px; color: var(--agate); 
            margin-bottom: 1rem; font-weight: 700; 
            font-size: clamp(1.8rem, 6vw, 3.5rem); 
        }
        .overlay-content p { 
            font-size: clamp(1rem, 2.5vw, 1.2rem); 
            line-height: 1.5; color: #ccc; margin-bottom: 0.8rem; 
        }

        .btn-action {
            background: transparent; border: 1px solid var(--agate); color: var(--agate);
            padding: 12px 30px; border-radius: 50px; cursor: pointer; font-family: inherit;
            font-size: 0.75rem; letter-spacing: 2px; transition: 0.3s; margin-top: 0.5rem;
            font-weight: 700; pointer-events: auto;
            flex-shrink: 0;
        }
        .btn-action:hover { background: var(--agate); color: #fff; }
        .btn-action:focus-visible { outline: 2px solid #fff; outline-offset: 4px; background: var(--agate); color: #fff; }

        /* Card Stage */
        #card-stage {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            position: relative; transform-style: preserve-3d;
            z-index: 100;
            pointer-events: none; /* Allow clicks through to dots/title/arrows */
        }

        .origami-container {
            width: 400px; height: 400px;
            position: absolute; transform-style: preserve-3d;
            cursor: pointer; transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            pointer-events: auto; /* Keep cards clickable */
            background: none; border: none; padding: 0; outline: none;
            -webkit-tap-highlight-color: transparent;
        }
        


        .card-inner {
            width: 100%; height: 100%;
            position: relative; transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
        }

        .face {
            position: absolute; 
            top: -1px; left: 0; 
            width: 100%; height: calc(100% + 2px); /* Slight bleed to cover seams */
            background-color: var(--paper); display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 30px; box-sizing: border-box; border-radius: 4px;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.05); color: #333; z-index: 1;
            transition: all 0.8s ease; transform: translateZ(-1px);
            overflow: hidden;
            background-image: linear-gradient(rgba(255,255,255,0.2), rgba(255,255,255,0));
        }

        /* Hinge Shadows */
        .face::before, .face::after {
            content: ''; position: absolute; left: 0; width: 100%; height: 40px;
            pointer-events: none; opacity: 0; transition: opacity 0.8s ease; z-index: 5;
        }
        .face::before { top: 1px; background: linear-gradient(to bottom, rgba(0,0,0,0.08), transparent); }
        .face::after { bottom: 1px; background: linear-gradient(to top, rgba(0,0,0,0.08), transparent); }
        .unfolded .face::before, .unfolded .face::after { opacity: 1; }

        .face p { font-size: 1rem; line-height: 1.6; text-align: center; margin: 0; color: #333; font-weight: 400; position: relative; z-index: 1; }
        .face p strong { font-size: 1rem; color: #000; font-weight: 700; }
        
        .face hr { width: 40px; border: none; border-top: 1px solid rgba(0,0,0,0.1); margin: 20px auto; position: relative; z-index: 1; }

        .flap {
            position: absolute; width: 100%; height: 50%;
            background-color: var(--paper); left: 0; z-index: 10;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-family: inherit; letter-spacing: 2px; font-weight: 700; color: #222;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), background 0.5s ease, border-color 0.4s ease, box-shadow 0.8s ease;
            box-shadow: 0 0 20px rgba(0,0,0,0.1); text-align: center; padding: 10px; box-sizing: border-box;
            background-image: linear-gradient(rgba(255,255,255,0.4), rgba(255,255,255,0));
        }

        .flap-top { 
            top: 0; transform-origin: top; border-bottom: 1px solid #ddd; border-radius: 4px 4px 0 0; 
            font-size: 1.8rem;
            line-height: 1.2; 
        }

        .flap-bottom { 
            bottom: 0; transform-origin: bottom; border-top: 1px solid #ddd; border-radius: 0 0 4px 4px; 
            font-size: 4rem;
        }

        .unfolded .flap { box-shadow: none; }
        .unfolded .flap-top { transform: rotateX(165deg); border-bottom-color: transparent; }
        .unfolded .flap-bottom { transform: rotateX(-165deg); border-top-color: transparent; }
        .unfolded .face { transform: translateZ(0px); box-shadow: 0 40px 80px rgba(0,0,0,0.4); }

        .controls {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center; gap: 15px; 
            z-index: 10; 
            pointer-events: auto;
        }

        .dots { display: flex; gap: 15px; justify-content: center; margin-bottom: 10px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,0.2); cursor: pointer; transition: 0.3s; border: none; padding: 0; outline: none; }
        .dot.active { background: var(--agate); transform: scale(1.5); box-shadow: 0 0 10px var(--agate); }
        .dot:focus-visible { outline: 2px solid #fff; outline-offset: 4px; background: rgba(255,255,255,0.5); }

        @media (max-width: 768px) {
            #header-branding { 
                top: calc(20px + env(safe-area-inset-top)) !important; 
                left: calc(20px + env(safe-area-inset-left)) !important; 
            }
            h1 { font-size: 1rem !important; }
            .logo-icon { width: 25px !important; height: 25px !important; }
            .origami-container { width: 340px; height: 340px; margin-top: -20px; }
            .face { padding: 20px; }
            .face p { font-size: 0.85rem; line-height: 1.4; }
            .face p strong { font-size: 0.85rem; }
            .face hr { margin: 10px auto; }
            .nav-arrow { width: 50px; height: 50px; backdrop-filter: none; background: rgba(0, 0, 0, 0.4); }
            .nav-left { left: calc(15px + env(safe-area-inset-left)); } 
            .nav-right { right: calc(15px + env(safe-area-inset-right)); }
            .overlay { backdrop-filter: none; background: rgba(5, 10, 16, 0.98); }
            .flap-top { font-size: 1.4rem; } 
            .flap-bottom { font-size: 3rem; }
            .controls { bottom: calc(60px + env(safe-area-inset-bottom)); }
        }

        @media (max-width: 400px) {
            .origami-container { width: 300px; height: 300px; }
            .face p { font-size: 0.75rem; line-height: 1.3; }
            .face p strong { font-size: 0.75rem; }
            .overlay-content h2 { font-size: 1.5rem; }
            .overlay-content p { font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <div id="bg-container"></div>

    <div id="header-branding">
        <h1>
            <a href="https://www.innovatecomms.co.uk/" style="color: inherit; text-decoration: none; display: flex; align-items: center; gap: 15px;">
                <svg class="logo-icon" viewBox="0 0 45 45" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12.8981 42.9916V2.34497L1.77832 13.4648V31.8718L12.8981 42.9916Z"></path>
                    <path d="M31.3051 2.34497L42.4249 13.4648V31.8718L31.3051 42.9916L12.8981 22.6678L31.3051 2.34497Z"></path>
                    <path d="M42.4252 13.4648L31.6953 22.6678L42.4252 31.8718"></path>
                    <path d="M31.3047 2.34497V42.9916"></path>
                    <path d="M1.77832 13.4648L12.7364 22.6508L1.77832 31.8718"></path>
                </svg>
                Innovate Comms
            </a>
        </h1>
    </div>

    <div id="intro-overlay" class="overlay active" role="dialog" aria-modal="true" aria-labelledby="intro-title">
        <div class="overlay-content">
            <div style="color:var(--agate); margin-bottom: 0.5rem;">
                <svg class="logo-icon" viewBox="0 0 45 45" style="width: clamp(30px, 10vw, 60px); height: clamp(30px, 10vw, 60px); margin-bottom: 0.2rem;">
                    <path d="M12.8981 42.9916V2.34497L1.77832 13.4648V31.8718L12.8981 42.9916Z"></path>
                    <path d="M31.3051 2.34497L42.4249 13.4648V31.8718L31.3051 42.9916L12.8981 22.6678L31.3051 2.34497Z"></path>
                    <path d="M42.4252 13.4648L31.6953 22.6678L42.4252 31.8718"></path>
                    <path d="M31.3047 2.34497V42.9916"></path>
                    <path d="M1.77832 13.4648L12.7364 22.6508L1.77832 31.8718"></path>
                </svg>
                <div style="font-size: clamp(1rem, 3vw, 1.5rem); letter-spacing: 5px; font-weight: 700; color: #fff;">INNOVATE COMMS</div>
            </div>
            <h2 id="intro-title"></h2>
            <p id="intro-p1" style="font-weight: 700; color: var(--agate);"></p>
            <p id="intro-p2"></p>
            <button id="start-btn" class="btn-action" onclick="startExperience()">EXPLORE STRATEGY</button>
        </div>
    </div>

    <div id="conclusion-overlay" class="overlay" role="dialog" aria-modal="true" aria-labelledby="outro-title">
        <div class="overlay-content">
            <div style="color:var(--agate); margin-bottom: 0.5rem;">
                <svg class="logo-icon" viewBox="0 0 45 45" style="width: clamp(30px, 10vw, 60px); height: clamp(30px, 10vw, 60px); margin-bottom: 0.2rem;">
                    <path d="M12.8981 42.9916V2.34497L1.77832 13.4648V31.8718L12.8981 42.9916Z"></path>
                    <path d="M31.3051 2.34497L42.4249 13.4648V31.8718L31.3051 42.9916L12.8981 22.6678L31.3051 2.34497Z"></path>
                    <path d="M42.4252 13.4648L31.6953 22.6678L42.4252 31.8718"></path>
                    <path d="M31.3047 2.34497V42.9916"></path>
                    <path d="M1.77832 13.4648L12.7364 22.6508L1.77832 31.8718"></path>
                </svg>
                <div style="font-size: clamp(1rem, 3vw, 1.5rem); letter-spacing: 5px; font-weight: 700; color: #fff;">INNOVATE COMMS</div>
            </div>
            <h2 id="outro-title"></h2>
            <p id="outro-p1"></p>
            <p id="outro-p2">Ready to do things differently? <a id="outro-email-link" href="" style="color:var(--agate); text-decoration:none; font-weight:bold;"></a></p>
            <button id="replay-btn" class="btn-action" onclick="resetExperience()">REPLAY</button>
        </div>
    </div>

    <template id="card-template">
        <div class="card-inner">
            <div class="flap flap-top"></div>
            <div class="face">
                <p class="card-desc"></p>
                <hr>
                <p class="card-implication"><strong></strong></p>
            </div>
            <div class="flap flap-bottom"><i class="fas"></i></div>
        </div>
    </template>

    <button class="nav-arrow nav-left" type="button" aria-label="Previous card" onclick="prevCard()">
        <i class="fas fa-chevron-left" aria-hidden="true"></i>
    </button>
    <button class="nav-arrow nav-right" type="button" aria-label="Next card" onclick="nextCard()">
        <i class="fas fa-chevron-right" aria-hidden="true"></i>
    </button>


    <div class="controls">
        <div class="dots" id="dots"></div>
        <div style="font-size: 0.6rem; opacity: 0.5; letter-spacing: 2px; text-align: center;">TAP CARD TO OPEN</div>
    </div>

    <div id="card-stage"></div>

    <script>
        const TELECOMS_CONFIG = {
            branding: {
                companyName: "Innovate Comms",
                website: "https://www.innovatecomms.co.uk/",
                email: "hello@innovatecomms.co.uk"
            },
            intro: {
                title: "5 THINGS SHAPING UK TELECOMS",
                subtitle: "And what it means for your comms",
                p1: "UK telecoms is in the middle of something significant – a period that's reshaping competitive dynamics, investment priorities, and the fundamental question of what telecoms is.",
                p2: "Long promised mergers are completing. AI is changing how we operate. Investments are being redistributed. And 6G needs a different story if it’s going to avoid 5G’s stumbles. These shifts create both urgency and opportunity and how you communicate matters more now than ever."
            },
            outro: {
                title: "The Common Thread",
                p1: "The next phase of UK telecoms will hinge on smart collaborations to create advanced, sustainable networks that are genuinely useful for the UK’s digital ambitions.",
                p2: "Ready to do things differently? Say hello@innovatecomms.co.uk"
            },
            trends: [
                {
                    id: 1,
                    tag: "MARKET",
                    title: "Market Consolidation",
                    desc: "Vodafone and Three are finally one, consuming them in a quagmire of integration. There’s a window of opportunity to communicate with clarity while the biggest player is distracted.",
                    implication: "With a new giant in the market, no one can compete on scale. Where you can compete is innovation, differentiation and focusing on what’s close to the hearts of your customers. Examine your proposition and don’t get bogged down in what worked before – this is a new playing field.",
                    stat: "Scale Shift",
                    statDesc: "Competition moves from scale to innovation.",
                    icon: "fa-handshake",
                    color: "#D6883A"
                },
                {
                    id: 2,
                    tag: "AI",
                    title: "AI Reality Check",
                    desc: "AI is already in the network and the benefit is real and measurable. But the AI narrative is stuck in either being futuristic or in the technical weeds. There’s an opportunity to tell it properly.",
                    implication: "Communicate what AI actually does in your solution, specifically for a real customer. That’s the story that cuts through. Don’t be afraid to tackle the issues and concerns around it – trust and security are paramount.",
                    stat: "Measurable AI",
                    statDesc: "Trust and security are paramount for national infrastructure.",
                    icon: "fa-brain",
                    color: "#842366",
                    powerupIcon: "fa-robot"
                },
                {
                    id: 3,
                    tag: "FIBRE",
                    title: "The Fibre Narrative",
                    desc: "Fibre is winning the infrastructure race but losing the public narrative. Confusion in a crowded market and affordability anxiety is currently winning over the impressive achievement.",
                    implication: "Battle the idea that fibre is a utility by showcasing the innovations it can enable. Shift the conversation from speed and price to impacts for remote business, rural productivity, and economic development.",
                    stat: "Narrative Gap",
                    statDesc: "Move the conversation from price to human impact.",
                    icon: "fa-network-wired",
                    color: "#3E9B9B",
                    powerupIcon: "fa-bolt"
                },
                {
                    id: 4,
                    tag: "SUSTAINABILITY",
                    title: "Sustainability Proof",
                    desc: "Sustainability pledges are no longer enough, proof is needed and the industry is facing a credibility problem. Tangible trials, data and transparency around net-zero is key.",
                    implication: "The era of sustainability-by-announcement is over. Make it tangible for increasingly savvy audiences using data, visualisation, and customer case studies to become a preferred supplier.",
                    stat: "Credibility",
                    statDesc: "Data and transparency are the new net-zero standards.",
                    icon: "fa-leaf",
                    color: "#15404F",
                    powerupIcon: "fa-leaf"
                },
                {
                    id: 5,
                    tag: "6G",
                    title: "The 6G Evolution",
                    desc: "The global race to 6G is on but commercial reception is cool. 5G overpromised and while research is focused, the comms strategy framing it as 'next gen mobile' is not.",
                    implication: "Against a backdrop of demand-led innovation, your comms needs to support a world where 6G is evolution, not revolution. Lead with business benefits and commercial outcomes.",
                    stat: "Outcome-Led",
                    statDesc: "Maintain UK position through commercial impact, not hype.",
                    icon: "fa-tower-broadcast",
                    color: "#4C194C",
                    powerupIcon: "fa-signal"
                }
            ]
        };

        const stage = document.getElementById('card-stage');
        const dotsContainer = document.getElementById('dots');
        const bgContainer = document.getElementById('bg-container');
        const introOverlay = document.getElementById('intro-overlay');
        const conclusionOverlay = document.getElementById('conclusion-overlay');
        
        let lastFocusedElement;

        function toggleBackgroundInert(isInert) {
            const selectors = ['#header-branding', '.nav-arrow', '.controls', '#card-stage'];
            selectors.forEach(s => {
                document.querySelectorAll(s).forEach(el => {
                    if (isInert) {
                        el.setAttribute('inert', '');
                        el.setAttribute('aria-hidden', 'true');
                    } else {
                        el.removeAttribute('inert');
                        el.removeAttribute('aria-hidden');
                    }
                });
            });
        }

        function trapFocus(e, overlay) {
            const focusableElements = overlay.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
            if (focusableElements.length === 0) return;
            const firstFocusableElement = focusableElements[0];
            const lastFocusableElement = focusableElements[focusableElements.length - 1];

            if (e.key === 'Tab') {
                if (e.shiftKey) { // Shift + Tab
                    if (document.activeElement === firstFocusableElement) {
                        lastFocusableElement.focus();
                        e.preventDefault();
                    }
                } else { // Tab
                    if (document.activeElement === lastFocusableElement) {
                        firstFocusableElement.focus();
                        e.preventDefault();
                    }
                }
            }
        }

        introOverlay.addEventListener('keydown', (e) => trapFocus(e, introOverlay));
        conclusionOverlay.addEventListener('keydown', (e) => trapFocus(e, conclusionOverlay));
        
        const config = TELECOMS_CONFIG;
        const trends = config.trends;
        let cards = [];
        let dots = [];
        let bgLayers = [];
        let currentIndex = 0;
        let isTransitioning = false;
        let isExperienceActive = false;

        function loadMasterContent() {
            document.getElementById('intro-title').textContent = config.intro.title.toUpperCase();
            document.getElementById('intro-p1').textContent = config.intro.subtitle;
            document.getElementById('intro-p2').textContent = config.intro.p1 + " " + config.intro.p2;
            document.getElementById('outro-title').textContent = config.outro.title.toUpperCase();
            document.getElementById('outro-p1').textContent = config.outro.p1;
            
            const email = config.branding.email;
            const emailLink = document.getElementById('outro-email-link');
            emailLink.href = `mailto:${email}`;
            emailLink.textContent = email;
        }

        function createCard(trend, index) {
            const template = document.getElementById('card-template');
            const clone = template.content.cloneNode(true);
            
            const container = document.createElement('button');
            container.className = 'origami-container';
            container.setAttribute('aria-label', `${trend.title} card`);
            container.setAttribute('aria-expanded', 'false');
            
            // Cache reference for performance
            const inner = clone.querySelector('.card-inner');
            container.innerElement = inner;
            
            // Fill structure using textContent (Safe and robust)
            const topFlap = clone.querySelector('.flap-top');
            topFlap.textContent = trend.title.toUpperCase();
            topFlap.style.color = trend.color;

            const bottomFlap = clone.querySelector('.flap-bottom');
            bottomFlap.style.color = trend.color;
            bottomFlap.querySelector('i').classList.add(trend.icon);

            clone.querySelector('.card-desc').textContent = trend.desc;
            clone.querySelector('.card-implication strong').textContent = trend.implication || trend.statDesc;

            container.appendChild(clone);

            container.onclick = () => { 
                if(index === currentIndex) nextCard();
            };
            stage.appendChild(container);
            
            const depth = index;
            gsap.set(container, { z: -depth * 60, y: depth * 10, rotation: (index % 2 === 0 ? 1 : -1) * (depth * 2), opacity: 1 });

            const dot = document.createElement('button');
            dot.className = 'dot';
            dot.setAttribute('aria-label', `Go to card ${index + 1}`);
            dot.onclick = () => jumpTo(index);
            dotsContainer.appendChild(dot);
            dots.push(dot);

            const bg = document.createElement('div');
            bg.className = 'bg-layer';
            bg.id = `bg-${index}`;
            bg.style.background = `radial-gradient(circle at center, ${trend.color} 0%, var(--bg-dark) 100%)`;
            bgContainer.appendChild(bg);
            bgLayers.push(bg);

            return container;
        }

        function init() {
            loadMasterContent();
            dots = [];
            bgLayers = [];
            cards = trends.map((t, i) => createCard(t, i));
            updateStack();
            // Initial state is intro overlay
            toggleBackgroundInert(true);
            // Initial focus for the intro overlay
            setTimeout(() => {
                if (introOverlay.classList.contains('active')) {
                    document.getElementById('start-btn').focus();
                }
            }, 500);
        }

        function updateStack() {
            cards.forEach((card, i) => {
                const inner = card.innerElement;
                const isCurrent = i === currentIndex;
                const isPast = i < currentIndex;

                if (isPast) {
                    gsap.to(card, { x: -window.innerWidth, opacity: 1, rotation: -20, duration: 0.6, ease: "power2.inOut", onComplete: () => { card.style.visibility = 'hidden'; } });
                    card.tabIndex = -1;
                    card.setAttribute('aria-hidden', 'true');
                } else if (isCurrent) {
                    const depth = i - currentIndex;
                    card.style.visibility = 'visible';
                    card.tabIndex = 0;
                    card.setAttribute('aria-hidden', 'false');
                    gsap.to(card, { x: 0, z: -depth * 60, y: depth * 10, rotation: (i % 2 === 0 ? 1 : -1) * (depth * 2), opacity: 1, duration: 0.6, ease: "power2.out" });
                    if (isExperienceActive) card.focus();
                } else {
                    const depth = i - currentIndex;
                    card.style.visibility = 'visible';
                    card.tabIndex = -1;
                    card.setAttribute('aria-hidden', 'true');
                    gsap.to(card, { x: 0, z: -depth * 60, y: depth * 10, rotation: (i % 2 === 0 ? 1 : -1) * (depth * 2), opacity: 1, duration: 0.6, ease: "power2.out" });
                    if (depth > 0) gsap.to(inner, { rotationX: 0, rotationY: 0, duration: 0.5 });
                }
            });
            bgLayers.forEach((l, i) => l.classList.toggle('active', i === currentIndex));
            dots.forEach((d, i) => d.classList.toggle('active', i === currentIndex));
        }

        function startExperience() {
            isExperienceActive = true;
            cards.forEach(c => c.classList.remove('unfolded'));
            document.body.classList.add('active-experience');
            introOverlay.classList.remove('active');
            toggleBackgroundInert(false);
            currentIndex = 0;
            updateStack();
        }

        function resetExperience() {
            conclusionOverlay.classList.remove('active');
            cards.forEach(c => c.classList.remove('unfolded'));
            document.body.classList.add('active-experience');
            toggleBackgroundInert(false);
            currentIndex = 0;
            isExperienceActive = true;
            updateStack();
        }

        function showConclusion() {
            isExperienceActive = false;
            lastFocusedElement = document.activeElement;
            document.body.classList.remove('active-experience');
            conclusionOverlay.classList.add('active');
            toggleBackgroundInert(true);
            document.getElementById('replay-btn').focus();
        }

        function showIntro() {
            isExperienceActive = false;
            lastFocusedElement = document.activeElement;
            document.body.classList.remove('active-experience');
            introOverlay.classList.add('active');
            toggleBackgroundInert(true);
            document.getElementById('start-btn').focus();
            // Reset cards to initial stack state but hidden
            cards.forEach((card, i) => {
                card.classList.remove('unfolded');
                card.setAttribute('aria-expanded', 'false');
                const depth = i;
                gsap.set(card, { x: 0, z: -depth * 60, y: depth * 10, rotation: (i % 2 === 0 ? 1 : -1) * (depth * 2), opacity: 1, visibility: 'hidden' });
            });
        }

        function nextCard() {
            if (!isExperienceActive || isTransitioning) return;
            
            const currentCard = cards[currentIndex];
            if (!currentCard.classList.contains('unfolded')) {
                currentCard.classList.add('unfolded');
                currentCard.setAttribute('aria-expanded', 'true');
                return;
            }

            if (currentIndex === cards.length - 1) {
                currentCard.setAttribute('aria-expanded', 'false');
                showConclusion();
            } else {
                currentCard.classList.remove('unfolded');
                currentCard.setAttribute('aria-expanded', 'false');
                isTransitioning = true;
                setTimeout(() => {
                    currentIndex++;
                    updateStack();
                    setTimeout(() => { isTransitioning = false; }, 600);
                }, 200);
            }
        }

        function prevCard() {
            if (!isExperienceActive || isTransitioning) return;
            if (currentIndex === 0) {
                showIntro();
            } else {
                cards[currentIndex].classList.remove('unfolded');
                cards[currentIndex].setAttribute('aria-expanded', 'false');
                isTransitioning = true;
                currentIndex--;
                updateStack();
                setTimeout(() => { isTransitioning = false; }, 600);
            }
        }

        function jumpTo(index) {
            if (!isExperienceActive || isTransitioning) return;
            
            if (index === currentIndex) {
                nextCard();
                return;
            }

            cards[currentIndex].classList.remove('unfolded');
            cards[currentIndex].setAttribute('aria-expanded', 'false');
            isTransitioning = true;
            currentIndex = index;
            updateStack();
            setTimeout(() => { isTransitioning = false; }, 600);
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextCard();
            if (e.key === 'ArrowLeft') prevCard();
        });

        init();
    </script>
</body>
</html>
